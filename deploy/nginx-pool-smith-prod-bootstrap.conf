# Installs as /etc/nginx/sites-available/pool-smith-prod (no .conf) — PHASE 1 (HTTP-only).
# Serves the app over plain HTTP so `nginx -t` passes with no cert on disk and
# certbot's HTTP-01 challenge can be answered. Replaced by the full TLS vhost
# after the cert is issued (see finish-tls.sh / DEPLOY.md).
server {
    listen 80;
    listen [::]:80;
    server_name pool-smith.com www.pool-smith.com dev.pool-smith.com;

    access_log /var/log/nginx/pool-smith-prod.access.log;
    error_log  /var/log/nginx/pool-smith-prod.error.log;

    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    location / {
        proxy_pass http://127.0.0.1:3008;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
