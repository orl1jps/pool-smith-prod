# Installs as /etc/nginx/sites-available/pool-smith-prod (no .conf) — PHASE 3 (full TLS).
# Cert is issued SEPARATELY and create-only (apex + www + dev in one request):
#   sudo certbot certonly --nginx -d pool-smith.com -d www.pool-smith.com -d dev.pool-smith.com
# (`--nginx` here is only the ACME *authenticator*; in certonly mode it does NOT
#  edit this vhost. --webroot/--standalone are equally fine.)
#
# dev.pool-smith.com serves the same app directly (HTTP 200, noindex) as a working
# preview host — it is NOT redirected to the canonical.

# HTTP -> HTTPS (preserve host; apex/www/dev each land on their own HTTPS vhost,
# then www folds to apex at the HTTPS layer below)
server {
    listen 80;
    listen [::]:80;
    server_name pool-smith.com www.pool-smith.com dev.pool-smith.com;
    return 301 https://$host$request_uri;
}

# HTTPS www -> apex
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.pool-smith.com;

    ssl_certificate     /etc/letsencrypt/live/pool-smith.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pool-smith.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://pool-smith.com$request_uri;
}

# HTTPS apex -> Next.js app on :3008
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name pool-smith.com;

    ssl_certificate     /etc/letsencrypt/live/pool-smith.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pool-smith.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/pool-smith-prod.access.log;
    error_log  /var/log/nginx/pool-smith-prod.error.log;

    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3008;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3008;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;
}

# HTTPS dev -> Next.js app on :3008 (working preview host, NOT canonical).
# Serves the same app directly; noindex so it never competes with the canonical
# in search.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dev.pool-smith.com;

    ssl_certificate     /etc/letsencrypt/live/pool-smith.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pool-smith.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/pool-smith-prod.access.log;
    error_log  /var/log/nginx/pool-smith-prod.error.log;

    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3008;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3008;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;
}
